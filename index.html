<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BeniLend</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="logo">BeniLend</h1>
                <p>Equipment Reservation System</p>
            </div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Login</button>

                <!-- Back Button under login button -->
                <div class="back-button-container">
                    <a href="https://abbychiu7.github.io/BeOne/" class="btn btn-back">🢀 BeOne</a>
                </div>
            </form>

            <div class="login-help">
                <div class="credentials-info">
                    <h4>Demo Credentials:</h4>
                    <div class="credential-item">
                        <strong>Student:</strong> user / pass
                    </div>
                    <div class="credential-item">
                        <strong>Admin:</strong> admin / pass
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('benilend_user')) {
            const user = JSON.parse(localStorage.getItem('benilend_user'));
            if (user.role === 'user') window.location.href = 'dashboard.html';
            else if (user.role === 'admin') window.location.href = 'admin.html';
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'user' && password === 'pass') {
                const user = { username: 'user', role: 'user', loginTime: new Date().toISOString() };
                localStorage.setItem('benilend_user', JSON.stringify(user));
                showFloatingNotification('Login successful! Welcome Student!', 'success', '👋');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else if (username === 'admin' && password === 'pass') {
                const user = { username: 'admin', role: 'admin', loginTime: new Date().toISOString() };
                localStorage.setItem('benilend_user', JSON.stringify(user));
                showFloatingNotification('Login successful! Welcome Admin!', 'success', '🔐');
                setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
            } else {
                showFloatingNotification('Invalid username or password!', 'error', '❌');
                const form = document.querySelector('.login-form');
                form.style.animation = 'shake 0.5s ease-in-out';
                setTimeout(() => { form.style.animation = ''; }, 500);
            }
        }

        function showFloatingNotification(message, type = 'success', icon = '✅') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <span style="font-size: 1.25rem;">${icon}</span>
                    <div>
                        <h4 style="margin: 0 0 0.25rem 0; color: var(--text); font-size: 1rem;">
                            ${type === 'success' ? 'Success!' : type === 'error' ? 'Error!' : 'Notice!'}
                        </h4>
                        <p style="margin: 0; color: var(--text-light); font-size: 0.9rem;">
                            ${message}
                        </p>
                    </div>
                </div>
            `;
            
            if (type === 'success') notification.style.borderLeftColor = '#4caf50';
            else if (type === 'error') notification.style.borderLeftColor = '#f44336';
            else if (type === 'warning') notification.style.borderLeftColor = '#ffa726';
            
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => { if (notification.parentNode) notification.parentNode.removeChild(notification); }, 300);
            }, 4000);
        }
    </script>
</body>
</html>
